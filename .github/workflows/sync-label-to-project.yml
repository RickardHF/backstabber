# Sync Label to Project Status
#
# When a status label is added to an issue, this workflow:
#   1. Updates the corresponding project item's Status field in the "AI Work" project
#   2. Removes any other status labels so only one is active at a time
#
# Label → Project Status mapping:
#   "Suggested Task"  → "Suggested Task"
#   "For Agent Work"  → "For Agent Work"
#   "Manual Task"     → "Manual Task"
#   "For Review"      → "For Review"
#
# Required secrets:
#   - CROSS_REPO_TOKEN: PAT with project read/write scope
#
# Required repository variable:
#   - PROJECT_OWNER: GitHub username that owns the project (e.g. "RickardHF")
#   - PROJECT_NUMBER: The project number (e.g. "2")

name: Sync Label to Project

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  sync:
    name: Sync label to project status
    runs-on: ubuntu-latest
    if: >-
      contains(fromJSON('["Suggested Task","For Agent Work","Manual Task","For Review"]'), github.event.label.name)
    env:
      LABEL: ${{ github.event.label.name }}
      ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      PROJECT_OWNER: ${{ vars.PROJECT_OWNER || 'RickardHF' }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER || '2' }}
      GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
    steps:
      - name: Remove other status labels
        run: |
          ALL_STATUS_LABELS='["Suggested Task","For Agent Work","Manual Task","For Review"]'
          CURRENT=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name')
          for lbl in $(echo "$ALL_STATUS_LABELS" | jq -r '.[]'); do
            if [ "$lbl" != "$LABEL" ] && echo "$CURRENT" | grep -qxF "$lbl"; then
              gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$lbl"
            fi
          done

      - name: Find project and item
        id: project
        run: |
          # Get project ID
          PROJECT_DATA=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  field(name: "Status") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options { id name }
                    }
                  }
                }
              }
            }
          ' -f owner="$PROJECT_OWNER" -F number="$PROJECT_NUMBER")

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id')
          FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.field.id')
          OPTION_ID=$(echo "$PROJECT_DATA" | jq -r --arg label "$LABEL" '.data.user.projectV2.field.options[] | select(.name == $label) | .id')

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::warning::Could not find project $PROJECT_OWNER/$PROJECT_NUMBER"
            exit 0
          fi

          if [ -z "$OPTION_ID" ] || [ "$OPTION_ID" = "null" ]; then
            echo "::warning::No matching status option for label '$LABEL'"
            exit 0
          fi

          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "field_id=$FIELD_ID" >> $GITHUB_OUTPUT
          echo "option_id=$OPTION_ID" >> $GITHUB_OUTPUT

          # Find the project item for this issue
          ITEM_ID=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { id }
                      }
                    }
                  }
                }
              }
            }
          ' -f projectId="$PROJECT_ID" \
            --jq ".data.node.items.nodes[] | select(.content.id == \"$ISSUE_NODE_ID\") | .id")

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            # Issue not in project yet — add it
            ITEM_ID=$(gh api graphql -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
            ' -f projectId="$PROJECT_ID" -f contentId="$ISSUE_NODE_ID" \
              --jq '.data.addProjectV2ItemById.item.id')
            echo "Added issue to project, item ID: $ITEM_ID"
          fi

          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT

      - name: Update project item status
        if: steps.project.outputs.item_id
        run: |
          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }
          ' \
            -f projectId="${{ steps.project.outputs.project_id }}" \
            -f itemId="${{ steps.project.outputs.item_id }}" \
            -f fieldId="${{ steps.project.outputs.field_id }}" \
            -f optionId="${{ steps.project.outputs.option_id }}"
          echo "✅ Updated project status to '$LABEL' for issue #$ISSUE_NUMBER"
