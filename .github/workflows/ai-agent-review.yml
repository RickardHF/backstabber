# AI Agent Review Workflow
#
# Triggers an AI agent to review work done on an issue. The agent inspects
# related pull requests, code changes, and test results, then provides feedback.
#
# Supports multiple AI tools:
# - copilot (GitHub Copilot CLI)
# - claude (Anthropic Claude Code CLI)
# - codex (OpenAI Codex CLI)
#
# Trigger methods:
#   1. workflow_dispatch: Manual trigger with issue number and AI tool selection
#   2. issues labeled: Auto-trigger when the "For Review" label is added
#
# Required secrets (depending on AI tool):
#   - COPILOT_GITHUB_TOKEN: For Copilot CLI authentication
#   - ANTHROPIC_API_KEY: For Claude Code CLI authentication
#   - OPENAI_API_KEY: For Codex CLI authentication
#
# Optional repository variable:
#   - AI_TOOL: Default AI tool when triggered by label events (copilot|claude|codex)

name: AI Agent Review

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to review'
        required: true
        type: number
      ai_tool:
        description: 'AI tool to use'
        required: false
        type: choice
        options:
          - copilot
          - claude
          - codex
        default: copilot
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  agent-review:
    name: Run AI Review Agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'For Review')
    env:
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
      AI_TOOL: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_tool || vars.AI_TOOL || 'copilot' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "body<<ISSUE_BODY_EOF"
            echo "$BODY"
            echo "ISSUE_BODY_EOF"
          } >> $GITHUB_OUTPUT

      # --- Install selected AI tool ---
      - name: Install Copilot CLI
        if: env.AI_TOOL == 'copilot'
        run: npm install -g @github/copilot

      - name: Install Claude Code CLI
        if: env.AI_TOOL == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Codex CLI
        if: env.AI_TOOL == 'codex'
        run: npm install -g @openai/codex

      # --- Install shared CLI tools ---
      - name: Install Playwright CLI
        run: |
          npm install -g @playwright/cli@latest
          npx playwright install --with-deps chromium

      - name: Install Playwright CLI skills
        run: playwright-cli install --skills

      # --- Load skills for Claude / Codex ---
      - name: Load skills context
        if: env.AI_TOOL != 'copilot'
        id: skills
        run: |
          SKILLS_CONTEXT=""
          for skill_dir in .github/skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              SKILLS_CONTEXT="${SKILLS_CONTEXT}
          $(cat "${skill_dir}SKILL.md")
          "
            fi
          done
          {
            echo "context<<SKILLS_EOF"
            echo "$SKILLS_CONTEXT"
            echo "SKILLS_EOF"
          } >> $GITHUB_OUTPUT

      # --- Authenticate & Run: Copilot ---
      - name: Authenticate for Copilot
        if: env.AI_TOOL == 'copilot'
        run: |
          umask 177
          printf '%s' "${{ secrets.COPILOT_GITHUB_TOKEN }}" > /tmp/copilot_pat.txt
          gh auth login --with-token < /tmp/copilot_pat.txt
          rm -f /tmp/copilot_pat.txt

      - name: Run Copilot Review Agent
        if: env.AI_TOOL == 'copilot'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copilot -p "
          You are a code reviewer. Review the work done for the following issue.

          ## Issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.title }}

          ${{ steps.issue.outputs.body }}

          ## Review Instructions

          1. Find all pull requests and recent commits related to this issue.
          2. Review the code changes for correctness, quality, and completeness.
          3. Check that the changes address the issue requirements.
          4. Verify tests exist and are adequate for the changes.
          5. Look for potential bugs, security issues, or performance problems.
          6. Post a review comment on any related pull requests with your findings.
          7. Comment on the issue with a summary of your review.
          8. If the work is satisfactory, approve the PR and note that in the issue.
          9. If changes are needed, request changes on the PR and detail what needs fixing.
          " \
            --model claude-opus-4.6 \
            --allow-tool='shell' \
            --allow-tool='write' \
            --allow-tool='read' \
            --allow-tool='url(github.com)' \
            --enable-all-github-mcp-tools \
            --no-ask-user \
            --autopilot

      # --- Authenticate & Run: Claude ---
      - name: Run Claude Review Agent
        if: env.AI_TOOL == 'claude'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          ${{ steps.skills.outputs.context }}

          You are a code reviewer. Review the work done for the following issue.

          ## Issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.title }}

          ${{ steps.issue.outputs.body }}

          ## Review Instructions

          1. Find all pull requests and recent commits related to this issue.
          2. Review the code changes for correctness, quality, and completeness.
          3. Check that the changes address the issue requirements.
          4. Verify tests exist and are adequate for the changes.
          5. Look for potential bugs, security issues, or performance problems.
          6. Post a review comment on any related pull requests with your findings.
          7. Comment on the issue with a summary of your review.
          " \
            --allowedTools 'shell' 'write' 'read'

      # --- Authenticate & Run: Codex ---
      - name: Run Codex Review Agent
        if: env.AI_TOOL == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --full-auto "
          ${{ steps.skills.outputs.context }}

          You are a code reviewer. Review the work done for the following issue.

          ## Issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.title }}

          ${{ steps.issue.outputs.body }}

          ## Review Instructions

          1. Find all pull requests and recent commits related to this issue.
          2. Review the code changes for correctness, quality, and completeness.
          3. Check that the changes address the issue requirements.
          4. Verify tests exist and are adequate for the changes.
          5. Look for potential bugs, security issues, or performance problems.
          6. Post a review comment on any related pull requests with your findings.
          7. Comment on the issue with a summary of your review.
          "
