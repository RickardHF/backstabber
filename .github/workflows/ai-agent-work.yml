# AI Agent Work Workflow
#
# Triggers an AI coding agent to work on an issue. Supports multiple AI tools:
# - copilot (GitHub Copilot CLI)
# - claude (Anthropic Claude Code CLI)
# - codex (OpenAI Codex CLI)
#
# Trigger methods:
#   1. workflow_dispatch: Manual trigger with issue number and AI tool selection
#   2. issues labeled: Auto-trigger when the "For Agent Work" label is added
#
# Required secrets:
#   - GH_PAT: A Personal Access Token for gh CLI (triggers cross-workflow label events)
#   - COPILOT_GITHUB_TOKEN: For Copilot CLI authentication (can be same as GH_PAT)
#   - ANTHROPIC_API_KEY: For Claude Code CLI authentication
#   - OPENAI_API_KEY: For Codex CLI authentication
#
# Optional repository variable:
#   - AI_TOOL: Default AI tool when triggered by label events (copilot|claude|codex)
#
# IMPORTANT: gh CLI must authenticate with a PAT (not GITHUB_TOKEN) so that
# label changes (e.g. adding "For Review") trigger the ai-agent-review workflow.

name: AI Agent Work

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work on'
        required: true
        type: number
      ai_tool:
        description: 'AI tool to use'
        required: false
        type: choice
        options:
          - copilot
          - claude
          - codex
        default: copilot
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  agent-work:
    name: Run AI Agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'For Agent Work')
    env:
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
      AI_TOOL: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_tool || vars.AI_TOOL || 'copilot' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6

      # --- Authenticate gh CLI with PAT (required for cross-workflow triggers) ---
      - name: Authenticate GitHub CLI with PAT
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token

      # --- Install selected AI tool ---
      - name: Install Copilot CLI
        if: env.AI_TOOL == 'copilot'
        run: npm install -g @github/copilot

      - name: Install Claude Code CLI
        if: env.AI_TOOL == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Codex CLI
        if: env.AI_TOOL == 'codex'
        run: npm install -g @openai/codex

      # --- Install shared CLI tools ---
      - name: Install Playwright CLI
        run: |
          npm install -g @playwright/cli@latest
          npx playwright install --with-deps chromium

      - name: Install Playwright CLI skills
        run: playwright-cli install --skills

      # --- Load skills for Claude / Codex ---
      - name: Load skills context
        if: env.AI_TOOL != 'copilot'
        id: skills
        run: |
          SKILLS_CONTEXT=""
          for skill_dir in .github/skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              SKILLS_CONTEXT="${SKILLS_CONTEXT}
          $(cat "${skill_dir}SKILL.md")
          "
            fi
          done
          {
            echo "context<<SKILLS_EOF"
            echo "$SKILLS_CONTEXT"
            echo "SKILLS_EOF"
          } >> $GITHUB_OUTPUT

      # --- Run: Copilot ---
      - name: Run Copilot Agent
        if: env.AI_TOOL == 'copilot'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot -p "
          Work on the following issue in this repository.

          ## Issue #${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}

          Use the gh cli tool to interact with GitHub. 

          Perform any neccesary code changes in a feature branch, but if there is already a feature branch for this issue, use that one instead. 
          
          When done, create a pull request if not already created.

          When done label the issue 'For Review' and remove the 'For Agent Work' label.

          " \
            --model claude-opus-4.6 \
            --allow-all-tools \
            --allow-all-paths \
            --allow-all-urls \
            --no-ask-user \
            --autopilot

      # --- Run: Claude ---
      - name: Run Claude Agent
        if: env.AI_TOOL == 'claude'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          ${{ steps.skills.outputs.context }}

          Work on the following issue in this repository.

          ## Issue #${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}

          Use the gh cli tool to interact with GitHub. 

          Perform any neccesary code changes in a feature branch, but if there is already a feature branch for this issue, use that one instead. 
          
          When done, create a pull request if not already created.

          When done label the issue 'For Review' and remove the 'For Agent Work' label.
          " \
            --allowedTools 'shell' 'write' 'read'

      # --- Run: Codex ---
      - name: Run Codex Agent
        if: env.AI_TOOL == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --full-auto "
          ${{ steps.skills.outputs.context }}

          Work on the following issue in this repository.

          ## Issue #${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}

          Use the gh cli tool to interact with GitHub. 

          Perform any neccesary code changes in a feature branch, but if there is already a feature branch for this issue, use that one instead. 
          
          When done, create a pull request if not already created.

          When done label the issue 'For Review' and remove the 'For Agent Work' label.
          "
