# AI Agent Work Workflow
#
# Triggers an AI coding agent to work on an issue. Supports multiple AI tools:
# - copilot (GitHub Copilot CLI)
# - claude (Anthropic Claude Code CLI)
# - codex (OpenAI Codex CLI)
#
# Trigger methods:
#   1. workflow_dispatch: Manual trigger with issue number and AI tool selection
#   2. projects_v2_item: Auto-trigger when issue status changes to "For Agent Work"
#      in the linked GitHub Project
#
# Required secrets (depending on AI tool):
#   - COPILOT_GITHUB_TOKEN: For Copilot CLI authentication
#   - ANTHROPIC_API_KEY: For Claude Code CLI authentication
#   - OPENAI_API_KEY: For Codex CLI authentication
#   - CROSS_REPO_TOKEN: For resolving project item details (projects_v2_item trigger)
#
# Optional repository variable:
#   - AI_TOOL: Default AI tool when triggered by project events (copilot|claude|codex)

name: AI Agent Work

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work on'
        required: true
        type: number
      ai_tool:
        description: 'AI tool to use'
        required: false
        type: choice
        options:
          - copilot
          - claude
          - codex
        default: copilot
  projects_v2_item:
    types: [edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Determine whether to run and resolve issue details
  # ---------------------------------------------------------------------------
  check:
    name: Resolve trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.result.outputs.should_run }}
      issue_number: ${{ steps.result.outputs.issue_number }}
      ai_tool: ${{ steps.result.outputs.ai_tool }}
    steps:
      - name: Resolve from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: dispatch
        run: |
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "issue_number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
          echo "ai_tool=${{ inputs.ai_tool }}" >> $GITHUB_OUTPUT

      - name: Resolve from project event
        if: github.event_name == 'projects_v2_item'
        id: project
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          # Only handle Issues (not PRs or drafts)
          CONTENT_TYPE="${{ github.event.projects_v2_item.content_type }}"
          if [ "$CONTENT_TYPE" != "Issue" ]; then
            echo "Content type is $CONTENT_TYPE, not Issue. Skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Resolve the issue from the project item's content node ID
          CONTENT_NODE_ID="${{ github.event.projects_v2_item.content_node_id }}"
          ISSUE_DATA=$(gh api graphql -f query='
            query($nodeId: ID!) {
              node(id: $nodeId) {
                ... on Issue {
                  number
                  repository {
                    name
                    owner { login }
                  }
                }
              }
            }
          ' -f nodeId="$CONTENT_NODE_ID")

          REPO_NAME=$(echo "$ISSUE_DATA" | jq -r '.data.node.repository.name')
          if [ "$REPO_NAME" != "${{ github.event.repository.name }}" ]; then
            echo "Issue is in $REPO_NAME, not ${{ github.event.repository.name }}. Skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check that the project item status is "For Agent Work"
          ITEM_NODE_ID="${{ github.event.projects_v2_item.node_id }}"
          STATUS=$(gh api graphql -f query='
            query($itemId: ID!) {
              node(id: $itemId) {
                ... on ProjectV2Item {
                  fieldValueByName(name: "Status") {
                    ... on ProjectV2ItemFieldSingleSelectValue { name }
                  }
                }
              }
            }
          ' -f itemId="$ITEM_NODE_ID" --jq '.data.node.fieldValueByName.name')

          if [ "$STATUS" != "For Agent Work" ]; then
            echo "Status is '$STATUS', not 'For Agent Work'. Skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ISSUE_NUMBER=$(echo "$ISSUE_DATA" | jq -r '.data.node.number')
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "ai_tool=${{ vars.AI_TOOL || 'copilot' }}" >> $GITHUB_OUTPUT

      - name: Set outputs
        id: result
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_run=${{ steps.dispatch.outputs.should_run }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ steps.dispatch.outputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "ai_tool=${{ steps.dispatch.outputs.ai_tool }}" >> $GITHUB_OUTPUT
          else
            echo "should_run=${{ steps.project.outputs.should_run }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ steps.project.outputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "ai_tool=${{ steps.project.outputs.ai_tool }}" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Run the AI agent
  # ---------------------------------------------------------------------------
  agent-work:
    name: Run AI Agent
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ needs.check.outputs.issue_number }}
      AI_TOOL: ${{ needs.check.outputs.ai_tool }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo "body<<ISSUE_BODY_EOF"
            echo "$BODY"
            echo "ISSUE_BODY_EOF"
          } >> $GITHUB_OUTPUT

      # --- Install selected AI tool ---
      - name: Install Copilot CLI
        if: env.AI_TOOL == 'copilot'
        run: npm install -g @github/copilot

      - name: Install Claude Code CLI
        if: env.AI_TOOL == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Codex CLI
        if: env.AI_TOOL == 'codex'
        run: npm install -g @openai/codex

      # --- Install shared CLI tools ---
      - name: Install Playwright CLI
        run: |
          npm install -g @playwright/cli@latest
          npx playwright install --with-deps chromium

      - name: Install Playwright CLI skills
        run: playwright-cli install --skills

      # --- Load skills for Claude / Codex ---
      - name: Load skills context
        if: env.AI_TOOL != 'copilot'
        id: skills
        run: |
          SKILLS_CONTEXT=""
          for skill_dir in .github/skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              SKILLS_CONTEXT="${SKILLS_CONTEXT}
          $(cat "${skill_dir}SKILL.md")
          "
            fi
          done
          {
            echo "context<<SKILLS_EOF"
            echo "$SKILLS_CONTEXT"
            echo "SKILLS_EOF"
          } >> $GITHUB_OUTPUT

      # --- Authenticate & Run: Copilot ---
      - name: Authenticate for Copilot
        if: env.AI_TOOL == 'copilot'
        run: |
          umask 177
          printf '%s' "${{ secrets.COPILOT_GITHUB_TOKEN }}" > /tmp/copilot_pat.txt
          gh auth login --with-token < /tmp/copilot_pat.txt
          rm -f /tmp/copilot_pat.txt

      - name: Run Copilot Agent
        if: env.AI_TOOL == 'copilot'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copilot -p "
          Work on the following issue in this repository.

          ## Issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.title }}

          ${{ steps.issue.outputs.body }}
          " \
            --model claude-opus-4.6 \
            --allow-tool='shell' \
            --allow-tool='write' \
            --allow-tool='read' \
            --allow-tool='url(github.com)' \
            --enable-all-github-mcp-tools \
            --no-ask-user \
            --autopilot

      # --- Authenticate & Run: Claude ---
      - name: Run Claude Agent
        if: env.AI_TOOL == 'claude'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          ${{ steps.skills.outputs.context }}

          Work on the following issue in this repository.

          ## Issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.title }}

          ${{ steps.issue.outputs.body }}
          " \
            --allowedTools 'shell' 'write' 'read'

      # --- Authenticate & Run: Codex ---
      - name: Run Codex Agent
        if: env.AI_TOOL == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --full-auto "
          ${{ steps.skills.outputs.context }}

          Work on the following issue in this repository.

          ## Issue #${ISSUE_NUMBER}: ${{ steps.issue.outputs.title }}

          ${{ steps.issue.outputs.body }}
          "